services:
  postgres:
    image: postgres:12
    container_name: temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: tempapp123456jingmei
      POSTGRES_DB: jingmei
    ports:
      - "5432:5432"
    volumes:
      - /data/origin/postgres:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal-server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PWD: tempapp123456jingmei
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: jingmei
    ports:
      - "7233:7233"

  temporal_ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8233:8080"

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    depends_on:
      - postgres
      - postgres_app
    ports:
      - "8081:8080"
